name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to build, for example v1.1.0. Leave empty to build the selected branch."
        required: false
        default: ""
      upload_to_release:
        description: "Upload the EXE to the GitHub Release for release_tag"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: python build_windows_exe.py

      - name: Prepare artifact name
        shell: pwsh
        run: |
          $version = ""
          if (Test-Path VERSION) {
            $version = (Get-Content VERSION | Select-Object -First 1).Trim()
          }
          if (-not $version) {
            $version = "${{ github.ref_name }}"
          }
          if (-not $version) {
            $version = "manual"
          }
          $exeName = "G-TMCE_${version}_win-x64.exe"
          Move-Item -Force "dist/G-TMCE.exe" "dist/$exeName"
          "EXE_NAME=$exeName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXE_NAME }}
          path: dist/${{ env.EXE_NAME }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: ${{ github.event_name == 'push' || github.event.inputs.upload_to_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: dist/${{ env.EXE_NAME }}
